STR_README_SYNC_DAY_BODY: "Xteink X4:ГғВӨГғВӨ ei pidГғВӨ kohdella ikГғВӨГғВӨn kuin siinГғВӨ olisi luotettava reaaliaikainen kello, joka selviГғВӨГғВӨ unesta luotettavalla tavalla. Joten tГғВӨmГғВӨ haarukka kГғВӨyttГғВӨГғВӨ kГғВӨytГғВӨnnГғВ¶llistГғВӨ mallia:\n\n1. SynkronointipГғВӨivГғВӨ muodostaa yhteyden Wi-Fin kautta ja hakee nykyisen pГғВӨivГғВӨmГғВӨГғВӨrГғВӨn/ajan NTP:n avulla.\n2. TГғВӨstГғВӨ pГғВӨivГғВӨmГғВӨГғВӨrГғВӨstГғВӨ tulee tilastojen kelvollinen viite.\n3. Jos laite myГғВ¶hemmin menettГғВӨГғВӨ voimassa olevan kellon, laiteohjelmisto palautuu viimeksi tallennettuun voimassa olevaan pГғВӨivГғВӨmГғВӨГғВӨrГғВӨГғВӨn.\n4. Kun otsikossa nГғВӨkyy varapГғВӨivГғВӨmГғВӨГғВӨrГғВӨ uuden synkronointipГғВӨivГғВӨmГғВӨГғВӨrГғВӨn sijaan, se on merkitty !:llГғВӨ.\n\nKГғВӨytГғВӨnnГғВ¶n merkitys:\n- YleensГғВӨ yksi synkronointi pГғВӨivГғВӨssГғВӨ ennen lukemista riittГғВӨГғВӨ\n- sen jГғВӨlkeen tilastot kГғВӨyttГғВӨvГғВӨt viimeistГғВӨ voimassa olevaa tallennettua pГғВӨivГғВӨГғВӨ\n- Jos todellinen pГғВӨivГғВӨ muuttuu, sinun tulee synkronoida uudelleen\n\nOletusarvoisesti aikavyГғВ¶hyke on \"Espanja / Madrid\". Voit valita oman aikavyГғВ¶hykkeesi ja pГғВӨivГғВӨmГғВӨГғВӨrГғВӨmuodon kohdassa Asetukset > Sovellukset."
STR_README_STATS_BODY: "SГғВӨГғВӨnnГғВ¶t:\n- Sinun tГғВӨytyy muodostaa WiГўвӮ¬вҖҳFi-yhteys kerran pГғВӨivГғВӨssГғВӨ.\n- Tietojen laskeminen edellyttГғВӨГғВӨ vГғВӨhintГғВӨГғВӨn 3 minuutin lukemista.\n\nTilastojen kirjaaminen edellyttГғВӨГғВӨ, ettГғВӨ pГғВӨivГғВӨ tunnistetaan.\n1. MГғВӨГғВӨritГғВӨ WiГўвӮ¬вҖҳFi-yhteys etukГғВӨteen.\n2. Paina kerran pГғВӨivГғВӨssГғВӨ (ennen lukemista) Sync Day -painiketta.\nSync Dayn jГғВӨlkeen kaikki toiminta kirjataan kyseiselle pГғВӨivГғВӨlle, kunnes painat Sync Dayta uudelleen seuraavana pГғВӨivГғВӨnГғВӨ.\n3. Nauti \"Reading Stats\"-, \"Reading Heatmap\"- ja \"Reading Day\" -toiminnoista.\n4. Valinnainen. Kohdassa \"Settings > Apps > Reading Stats\" voit mukauttaa, nollata ja muokata tilastoja.\n\nValinnainen: jos haluat kirjoja ilman tilastoja, luo hakemisto nimeltГғВӨ /ignore_stats/ ja laita EPUB-tiedostosi sinne."
STR_README_BOOKMARKS_BODY: "Kun kirja on auki:\n- Jos pidГғВӨt alempaa OK-nГғВӨppГғВӨintГғВӨ painettuna, nykyinen sivu tallennetaan kirjanmerkiksi.\n- Jos painat samaa nГғВӨppГғВӨintГғВӨ nopeasti, valikko avautuu, jotta voit tarkistaa kirjanmerkit nopeasti.\n- Voit poistaa kirjanmerkin pitГғВӨmГғВӨllГғВӨ samaa painiketta uudelleen painettuna, kun kirjanmerkki on valittuna."
STR_README_SLEEP_BODY: "Mukauta lepotilanГғВӨyttГғВ¶jГғВӨ niin paljon kuin haluat.\nSinulla voi olla erilaisia ГўвӮ¬вҖ№ГўвӮ¬вҖ№hakemistoja, valita kumpaa haluat kГғВӨyttГғВӨГғВӨ, selata kuvia hitaasti ja jopa pГғВӨГғВӨttГғВӨГғВӨ, onko jГғВӨrjestys satunnainen vai perГғВӨkkГғВӨinen.\n\nVoit luoda ylimГғВӨГғВӨrГғВӨisiГғВӨ kansioita, kunhan ne alkavat sanalla sleep_, esimerkiksi: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "Kohdassa Asetukset > Sovellukset > Pikakuvakkeet voit:\n- Valitse, mitkГғВӨ sovellukset nГғВӨkyvГғВӨt aloitussivulla tai sovelluksissa\n- Muuta minkГғВӨ tahansa sovelluksen jГғВӨrjestystГғВӨ molemmilla nГғВӨytГғВ¶illГғВӨ"
STR_README_ACHIEVEMENTS_BODY: "Muista kГғВӨyttГғВӨГғВӨ SynkronointipГғВӨivГғВӨГғВӨ joka pГғВӨivГғВӨ, jotta useimmat saavutukset voidaan seurata oikein.\nAchievements on yksinkertainen pelillistГғВӨmisjГғВӨrjestelmГғВӨ, jossa on lukutavoitteita ja virstanpylvГғВӨitГғВӨ avattavaksi."
STR_README_IF_FOUND_BODY: "Sovellus, joka auttaa jotakuta palauttamaan laitteen, jos se katoaa.\n\nKirjoittaminen tГғВӨllГғВӨ laitteella on tuskallista, joten jos lisГғВӨГғВӨt SD-kortille tiedoston nimeltГғВӨ if_found.txt, sen sisГғВӨltГғВ¶ nГғВӨytetГғВӨГғВӨn, kun tГғВӨmГғВӨ sovellus avataan.\n\nVoit kirjoittaa sinne mitГғВӨ haluat: lauseen, puhelinnumeron, sГғВӨhkГғВ¶postin..."

