STR_README_TOPIC_SHORTCUTS: "PersonalizaГҲвҖәi AcasГ„Ж’ ГҲв„ўi aplicaГҲвҖәii"
STR_README_SYNC_DAY_BODY: "Xteink X4 nu ar trebui tratat ca ГҲв„ўi cum ar avea un ceas de ГғВ®ncredere ГғВ®n timp real, care supravieГҲвҖәuieГҲв„ўte somnului ГғВ®ntr-un mod de ГғВ®ncredere. Deci, aceastГ„Ж’ furcГ„Ж’ foloseГҲв„ўte un model practic:\n\n1. Sync Day se conecteazГ„Ж’ prin Wi-Fi ГҲв„ўi preia data/ora curentГ„Ж’ folosind NTP.\n2. Acea datГ„Ж’ devine referinГҲвҖәa valabilГ„Ж’ pentru statistici.\n3. DacГ„Ж’ ulterior dispozitivul pierde un ceas curent valabil, firmware-ul revine la ultima datГ„Ж’ valabilГ„Ж’ salvatГ„Ж’.\n4. CГғВўnd antetul afiГҲв„ўeazГ„Ж’ o datГ„Ж’ alternativГ„Ж’ ГғВ®n loc de o nouГ„Ж’ datГ„Ж’ sincronizatГ„Ж’, este marcat cu !.\n\nSens practic:\n- o sincronizare pe zi ГғВ®nainte de citire este de obicei suficientГ„Ж’\n- dupГ„Ж’ aceea, statisticile continuГ„Ж’ sГ„Ж’ utilizeze ultima zi salvatГ„Ж’ valabilГ„Ж’\n- dacГ„Ж’ ziua realГ„Ж’ se schimbГ„Ж’, ar trebui sГ„Ж’ vГ„Ж’ sincronizaГҲвҖәi din nou\n\nГғЕҪn mod implicit, fusul orar este ГўвӮ¬ЕҫSpania / MadridГўвӮ¬Вқ. PuteГҲвҖәi selecta propriul fus orar ГҲв„ўi formatul de datГ„Ж’ ГғВ®n SetГ„Ж’ri > AplicaГҲвҖәii."
STR_README_STATS_BODY: "Reguli:\n- Trebuie sГ„Ж’ te conectezi la WiГўвӮ¬вҖҳFi 1 datГ„Ж’ pe zi.\n- Sunt necesare cel puГҲвҖәin 3 minute de citit pentru ca datele sГ„Ж’ fie luate ГғВ®n calcul.\n\nPentru a ГғВ®nregistra statistici este necesar sГ„Ж’ fie identificatГ„Ж’ ziua.\n1. ConfigureazГ„Ж’ ГғВ®n prealabil conexiunea WiГўвӮ¬вҖҳFi.\n2. ApasГ„Ж’ 1 datГ„Ж’ pe zi (ГғВ®nainte de a citi) butonul Sync Day.\nDupГ„Ж’ Sync Day, toatГ„Ж’ activitatea va fi ГғВ®nregistratГ„Ж’ ГғВ®n acea zi pГғВўnГ„Ж’ cГғВўnd vei apГ„Ж’sa din nou Sync Day ГғВ®n ziua urmГ„Ж’toare.\n3. BucurГ„Ж’-te de \"Reading Stats\", \"Reading Heatmap\".\n4. OpГҲвҖәional. ГғЕҪn \"Settings > Apps > Reading Stats\" poГҲвҖәi personaliza, reseta ГҲв„ўi modifica statisticile.\n\nOpГҲвҖәional: dacГ„Ж’ vrei cГ„Ж’rГҲвҖәi fГ„Ж’rГ„Ж’ statistici, creeazГ„Ж’ un director numit /ignore_stats/ ГҲв„ўi pune acolo EPUB-urile tale."
STR_README_BOOKMARKS_BODY: "ГғЕҪn timp ce o carte este deschisГ„Ж’:\n- DacГ„Ж’ ГҲвҖәineГҲвҖәi apГ„Ж’satГ„Ж’ tasta OK de jos, pagina curentГ„Ж’ este salvatГ„Ж’ ca marcaj.\n- DacГ„Ж’ atingeГҲвҖәi rapid aceeaГҲв„ўi tastГ„Ж’, se deschide un meniu, astfel ГғВ®ncГғВўt sГ„Ж’ puteГҲвҖәi verifica rapid marcajele.\n- Pentru a ГҲв„ўterge un marcaj, ГҲвҖәineГҲвҖәi apГ„Ж’sat din nou acelaГҲв„ўi buton ГғВ®n timp ce marcajul este selectat."
STR_README_SLEEP_BODY: "PersonalizaГҲвҖәi ecranele de somn atГғВўt cГғВўt doriГҲвҖәi.\nPuteГҲвҖәi avea directoare diferite, puteГҲвҖәi alege pe care sГ„Ж’ le utilizaГҲвҖәi, puteГҲвҖәi rГ„Ж’sfoi lent imaginile ГҲв„ўi chiar sГ„Ж’ decideГҲвҖәi dacГ„Ж’ ordinea este aleatorie sau secvenГҲвҖәialГ„Ж’.\n\nPuteГҲвҖәi crea dosare suplimentare atГғВўta timp cГғВўt ГғВ®ncep cu sleep_, de exemplu: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "ГғЕҪn SetГ„Ж’ri > AplicaГҲвҖәii > Comenzi rapide puteГҲвҖәi:\n- alegeГҲвҖәi ce aplicaГҲвҖәii sunt afiГҲв„ўate ГғВ®n AcasГ„Ж’ sau ГғВ®n AplicaГҲвҖәii\n- schimbaГҲвҖәi ordinea oricГ„Ж’rei aplicaГҲвҖәii pe ambele ecrane"
STR_README_ACHIEVEMENTS_BODY: "Nu uitaГҲвҖәi sГ„Ж’ utilizaГҲвҖәi Ziua SincronizГ„Ж’rii ГғВ®n fiecare zi, astfel ГғВ®ncГғВўt majoritatea realizГ„Ж’rilor sГ„Ж’ poatГ„Ж’ fi urmГ„Ж’rite corect.\nAchievements este un sistem simplu de gamification cu obiective de citire ГҲв„ўi repere de deblocat."
STR_README_IF_FOUND_BODY: "O aplicaГҲвҖәie care ajutГ„Ж’ pe cineva sГ„Ж’ returneze dispozitivul dacГ„Ж’ acesta se pierde.\n\nTastarea pe acest dispozitiv este dureroasГ„Ж’, aГҲв„ўa cГ„Ж’ dacГ„Ж’ adГ„Ж’ugaГҲвҖәi un fiГҲв„ўier numit if_found.txt pe cardul SD, conГҲвҖәinutul acestuia va fi afiГҲв„ўat atunci cГғВўnd aceastГ„Ж’ aplicaГҲвҖәie este deschisГ„Ж’.\n\nPuteГҲвҖәi scrie acolo orice doriГҲвҖәi: o propoziГҲвҖәie, un numГ„Ж’r de telefon, un e-mail..."

