STR_README_SYNC_DAY_BODY: "Xteink X4 nie powinien byГ„вҖЎ traktowany tak, jakby miaГ…вҖҡ niezawodny zegar czasu rzeczywistego, ktГғВіry w godny zaufania sposГғВіb przetrwa sen. Zatem w tym widelcu zastosowano praktyczny model:\n\n1. Sync Day Г…вҖҡГ„вҖҰczy siГ„в„ў przez Wi-Fi i pobiera aktualnГ„вҖҰ datГ„в„ў/godzinГ„в„ў za pomocГ„вҖҰ protokoГ…вҖҡu NTP.\n2. Data ta staje siГ„в„ў waГ…Вјnym punktem odniesienia dla statystyk.\n3. JeГ…вҖәli pГғВіГ…Вәniej urzГ„вҖҰdzenie utraci waГ…Вјny bieГ…ВјГ„вҖҰcy zegar, oprogramowanie sprzГ„в„ўtowe powrГғВіci do ostatniej zapisanej waГ…Вјnej daty.\n4. JeГ…вҖәli w nagГ…вҖҡГғВіwku zamiast daty nowej synchronizacji znajduje siГ„в„ў data zastГ„в„ўpcza, jest ona oznaczona !.\n\nZnaczenie praktyczne:\n- zwykle wystarcza jedna synchronizacja dziennie przed czytaniem\n- nastГ„в„ўpnie statystyki bГ„в„ўdГ„вҖҰ kontynuowane z wykorzystaniem ostatniego waГ…Вјnego zapisanego dnia\n- jeГ…вҖәli rzeczywisty dzieГ…вҖһ ulegnie zmianie, naleГ…Вјy przeprowadziГ„вҖЎ ponownГ„вҖҰ synchronizacjГ„в„ў\n\nDomyГ…вҖәlna strefa czasowa to ГўвӮ¬ЕҫHiszpania / MadrytГўвӮ¬Вқ. MoГ…Вјesz wybraГ„вҖЎ wГ…вҖҡasnГ„вҖҰ strefГ„в„ў czasowГ„вҖҰ i format daty w Ustawieniach > Aplikacje."
STR_README_STATS_BODY: "Zasady:\n- Musisz poГ…вҖҡГ„вҖҰczyГ„вҖЎ siГ„в„ў z WiГўвӮ¬вҖҳFi 1 raz dziennie.\n- Aby dane zostaГ…вҖҡy zaliczone, potrzebne sГ„вҖҰ co najmniej 3 minuty czytania.\n\nAby zapisywaГ„вҖЎ statystyki, trzeba najpierw ustaliГ„вҖЎ dzieГ…вҖһ.\n1. WczeГ…вҖәniej skonfiguruj poГ…вҖҡГ„вҖҰczenie WiГўвӮ¬вҖҳFi.\n2. NaciГ…вҖәnij przycisk Sync Day 1 raz dziennie (przed czytaniem).\nPo Sync Day caГ…вҖҡa aktywnoГ…вҖәГ„вҖЎ bГ„в„ўdzie zapisywana do tego dnia, dopГғВіki nastГ„в„ўpnego dnia ponownie nie naciГ…вҖәniesz Sync Day.\n3. Korzystaj z \"Reading Stats\", \"Reading Heatmap\".\n4. Opcjonalnie. W \"Settings > Apps > Reading Stats\" moГ…Вјesz personalizowaГ„вҖЎ, resetowaГ„вҖЎ i modyfikowaГ„вҖЎ statystyki.\n\nOpcjonalnie: jeГ…вҖәli chcesz mieГ„вҖЎ ksiГ„вҖҰГ…Вјki bez statystyk, utwГғВіrz katalog o nazwie /ignore_stats/ i umieГ…вҖәГ„вҖЎ tam swoje pliki EPUB."
STR_README_BOOKMARKS_BODY: "Gdy ksiГ„вҖҰГ…Вјka jest otwarta:\n- JeГ…вҖәli przytrzymasz dolny klawisz OK, bieГ…ВјГ„вҖҰca strona zostanie zapisana jako zakГ…вҖҡadka.\n- JeГ…вҖәli szybko naciГ…вҖәniesz ten sam klawisz, otworzy siГ„в„ў menu, w ktГғВіrym moГ…Вјesz szybko sprawdziГ„вҖЎ zakГ…вҖҡadki.\n- Aby usunГ„вҖҰГ„вҖЎ zakГ…вҖҡadkГ„в„ў, przytrzymaj ten sam przycisk ponownie, gdy zakГ…вҖҡadka jest zaznaczona."
STR_README_SLEEP_BODY: "Dostosuj ekrany uГ…вҖәpienia tak, jak chcesz.\nMoГ…Вјesz mieГ„вҖЎ rГғВіГ…Вјne katalogi, wybieraГ„вҖЎ, ktГғВіrego chcesz uГ…ВјyГ„вҖЎ, powoli przeglГ„вҖҰdaГ„вҖЎ zdjГ„в„ўcia, a nawet decydowaГ„вҖЎ, czy kolejnoГ…вҖәГ„вҖЎ jest losowa, czy sekwencyjna.\n\nMoГ…Вјesz utworzyГ„вҖЎ dodatkowe foldery, o ile zaczynajГ„вҖҰ siГ„в„ў od ГўвӮ¬Еҫsnu_ГўвӮ¬Вқ, na przykГ…вҖҡad: ГўвӮ¬Еҫsleep_booksГўвӮ¬Вқ, ГўвӮ¬Еҫsleep_geekГўвӮ¬Вқ, ГўвӮ¬Еҫsleep_disneyГўвӮ¬Вқ, ГўвӮ¬Еҫsleep_mangaГўвӮ¬ВқГўвӮ¬ВҰ"
STR_README_SHORTCUTS_BODY: "W Ustawieniach > Aplikacje > SkrГғВіty moГ…Вјesz:\n- wybierz, ktГғВіre aplikacje majГ„вҖҰ byГ„вҖЎ wyГ…вҖәwietlane w Strona gГ…вҖҡГғВіwna lub w Aplikacje\n- zmieГ…вҖһ kolejnoГ…вҖәГ„вҖЎ dowolnej aplikacji na obu ekranach"
STR_README_ACHIEVEMENTS_BODY: "PamiГ„в„ўtaj, aby codziennie korzystaГ„вҖЎ z Dnia synchronizacji, aby wiГ„в„ўkszoГ…вҖәГ„вҖЎ osiГ„вҖҰgniГ„в„ўГ„вҖЎ mogГ…вҖҡa byГ„вҖЎ prawidГ…вҖҡowo Г…вҖәledzona.\nOsiГ„вҖҰgniГ„в„ўcia to prosty system grywalizacji z odczytywaniem celГғВіw i kamieni milowych do odblokowania."
STR_README_IF_FOUND_BODY: "Aplikacja, ktГғВіra pomaga zwrГғВіciГ„вҖЎ zgubione urzГ„вҖҰdzenie.\n\nPisanie na tym urzГ„вҖҰdzeniu jest bolesne, wiГ„в„ўc jeГ…вҖәli dodasz plik o nazwie if_found.txt na kartГ„в„ў SD, jego zawartoГ…вҖәГ„вҖЎ zostanie wyГ…вҖәwietlona po otwarciu tej aplikacji.\n\nMoГ…Вјesz tam napisaГ„вҖЎ co chcesz: zdanie, numer telefonu, e-mail..."

