STR_README_ACHIEVEMENTS_BODY: "ГғвҖЎoГ„Еёu baГ…ЕёarГ„ВұnГ„Вұn doГ„Еёru bir Г…Еёekilde takip edilebilmesi iГғВ§in Senkronizasyon GГғВјnГғВј'nГғВј her gГғВјn kullanmayГ„Вұ unutmayГ„Вұn.\nBaГ…ЕёarГ„Вұlar, okuma hedeflerini ve kilidini aГғВ§acak kilometre taГ…ЕёlarГ„ВұnГ„Вұ iГғВ§eren basit bir oyunlaГ…ЕёtГ„Вұrma sistemidir."
STR_README_IF_FOUND_BODY: "KaybolmasГ„Вұ durumunda birisinin cihazГ„Вұ iade etmesine yardГ„ВұmcГ„Вұ olan bir uygulama.\n\nBu cihazda yazmak zahmetlidir, bu nedenle SD karta if_found.txt adlГ„Вұ bir dosya eklerseniz iГғВ§eriГ„Еёi bu uygulama aГғВ§Г„ВұldГ„ВұГ„ЕёГ„Вұnda gГғВ¶sterilecektir.\n\nOraya istediГ„Еёiniz her Г…Еёeyi yazabilirsiniz: bir cГғВјmle, bir telefon numarasГ„Вұ, bir e-posta..."

