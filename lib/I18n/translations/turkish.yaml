STR_README_SYNC_DAY_BODY: "Xteink X4'e, uykuda gГғВјvenilir bir Г…Еёekilde hayatta kalabilen gГғВјvenilir bir gerГғВ§ek zamanlГ„Вұ saate sahipmiГ…Её gibi davranГ„ВұlmamalГ„ВұdГ„Вұr. Yani bu ГғВ§atal pratik bir model kullanГ„Вұyor:\n\n1. Sync Day, Wi-Fi ГғВјzerinden baГ„ЕёlanГ„Вұr ve NTP'yi kullanarak geГғВ§erli tarih/saati getirir.\n2. Bu tarih, istatistikler iГғВ§in geГғВ§erli referans haline gelir.\n3. Cihaz daha sonra geГғВ§erli geГғВ§erli saati kaybederse, cihaz yazГ„ВұlГ„ВұmГ„Вұ en son kaydedilen geГғВ§erli tarihe geri dГғВ¶ner.\n4. BaГ…ЕёlГ„Вұk, yeni senkronize edilmiГ…Её tarih yerine bir geri dГғВ¶nГғВјГ…Её tarihi gГғВ¶steriyorsa, ! ile iГ…Еёaretlenir.\n\nPratik anlamГ„Вұ:\n- okumadan ГғВ¶nce gГғВјnde bir senkronizasyon genellikle yeterlidir\n- bundan sonra istatistikler son geГғВ§erli kayГ„ВұtlГ„Вұ gГғВјnГғВј kullanmaya devam eder\n- gerГғВ§ek gГғВјn deГ„ЕёiГ…Еёirse yeniden senkronizasyon yapmalГ„ВұsГ„ВұnГ„Вұz\n\nVarsayГ„Вұlan olarak saat dilimi \"Г„В°spanya / Madrid\"dir. Ayarlar > Uygulamalar bГғВ¶lГғВјmГғВјnde kendi saat diliminizi ve tarih biГғВ§iminizi seГғВ§ebilirsiniz."
STR_README_STATS_BODY: "Kurallar:\n- GГғВјnde 1 kez WiГўвӮ¬вҖҳFi'ye baГ„Еёlanman gerekir.\n- Verilerin sayГ„ВұlmasГ„Вұ iГғВ§in en az 3 dakika okuma gerekir.\n\nГ„В°statistikleri kaydedebilmek iГғВ§in ГғВ¶nce gГғВјnГғВјn belirlenmesi gerekir.\n1. WiГўвӮ¬вҖҳFi baГ„ЕёlantГ„ВұsГ„ВұnГ„Вұ ГғВ¶nceden ayarla.\n2. GГғВјnde 1 kez (okumadan ГғВ¶nce) Sync Day dГғВјГ„Еёmesine bas.\nSync Day'den sonra tГғВјm etkinlik, ertesi gГғВјn yeniden Sync Day'e basana kadar o gГғВјn altГ„Вұnda kaydedilir.\n3. \"Reading Stats\", \"Reading Heatmap\" keyfini ГғВ§Г„Вұkar.\n4. Г„В°steГ„Еёe baГ„ЕёlГ„Вұ. \"Settings > Apps > Reading Stats\" iГғВ§inde istatistikleri ГғВ¶zelleГ…Еёtirebilir, sГ„ВұfГ„Вұrlayabilir ve deГ„ЕёiГ…Еёtirebilirsin.\n\nГ„В°steГ„Еёe baГ„ЕёlГ„Вұ: istatistiksiz kitaplar istiyorsan /ignore_stats/ adlГ„Вұ bir dizin oluГ…Еёtur ve EPUB dosyalarГ„ВұnГ„Вұ oraya koy."
STR_README_BOOKMARKS_BODY: "Bir kitap aГғВ§Г„Вұkken:\n- Alttaki OK tuГ…Еёunu basГ„ВұlГ„Вұ tutarsanГ„Вұz geГғВ§erli sayfa yer imi olarak kaydedilir.\n- AynГ„Вұ tuГ…Еёa hГ„ВұzlГ„Вұ bir Г…Еёekilde dokunursanГ„Вұz, yer imlerini hГ„ВұzlГ„Вұ bir Г…Еёekilde kontrol edebilmeniz iГғВ§in bir menГғВј aГғВ§Г„ВұlГ„Вұr.\n- Bir yer imini silmek iГғВ§in, yer imi seГғВ§iliyken aynГ„Вұ dГғВјГ„Еёmeyi tekrar basГ„ВұlГ„Вұ tutun."
STR_README_SLEEP_BODY: "Uyku ekranlarГ„ВұnГ„Вұ istediГ„Еёiniz kadar ГғВ¶zelleГ…Еёtirin.\nFarklГ„Вұ dizinlere sahip olabilir, hangisini kullanacaГ„ЕёГ„ВұnГ„ВұzГ„Вұ seГғВ§ebilir, resimlere yavaГ…ЕёГғВ§a gГғВ¶z atabilir ve hatta sГ„ВұranГ„Вұn rastgele mi yoksa sГ„ВұralГ„Вұ mГ„Вұ olacaГ„ЕёГ„Вұna karar verebilirsiniz.\n\nSleep_ ile baГ…ЕёladГ„ВұklarГ„Вұ sГғВјrece ekstra klasГғВ¶rler oluГ…Еёturabilirsiniz, ГғВ¶rneГ„Еёin: uyku_kitaplarГ„Вұ, uyku_geek, uyku_disney, uyku_manga..."
