STR_README: "ReadMe"
STR_README_APP_DESC: "Quick guide to key vCodex features"
STR_README_GITHUB_HINT: "More details on GitHub @franssjz"
STR_README_TOPIC_SHORTCUTS: "Customize Home and Apps"
STR_README_SYNC_DAY_BODY: "The Xteink X4 should not be treated as if it had a reliable real-time clock that survives sleep in a trustworthy way. So this fork uses a practical model:\n\n1. Sync Day connects over Wi-Fi and fetches the current date/time using NTP.\n2. That date becomes the valid reference for stats.\n3. If the device later loses a valid current clock, the firmware falls back to the last saved valid date.\n4. When the header is showing a fallback date instead of a fresh synced date, it is marked with !.\n\nPractical meaning:\n- one sync per day before reading is usually enough\n- after that, stats continue using the last valid saved day\n- if the real day changes, you should sync again\n\nBy default the time zone is \"Spain / Madrid\". You can select your own time zone and date format in Settings > Apps."
STR_README_STATS_BODY: "Rules:\n- You need to connect to Wi-Fi once per day.\n- At least 3 minutes of reading are required before data is counted.\n\nTo record stats, the firmware first needs to know which day it is.\n1. Set up Wi-Fi beforehand.\n2. Press Sync Day once per day before reading.\nAfter Sync Day, all reading activity is recorded under that day until you press Sync Day again on the next day.\n3. Use \"Reading Stats\", \"Reading Heatmap\" and \"Reading Day\".\n4. Optional. In \"Settings > Apps > Reading Stats\" you can customize, reset and manage stats.\n\nOptional: if you want books without stats, create a directory called /ignore_stats/ and put those EPUBs there."
STR_README_BOOKMARKS_BODY: "While a book is open:\n- If you hold the bottom OK key, the current page is saved as a bookmark.\n- If you tap the same key quickly, a menu opens so you can check bookmarks quickly.\n- To delete a bookmark, hold the same button again while the bookmark is selected."
STR_README_SLEEP_BODY: "Customize sleep screens as much as you want.\nYou can have different directories, choose which one to use, browse through the pictures slowly, and even decide whether the order is random or sequential.\n\nYou can create extra folders as long as they start with sleep_, for example: sleep_books, sleep_geek, sleep_disney, sleep_manga..."
STR_README_SHORTCUTS_BODY: "In Settings > Apps > Shortcuts you can:\n- choose whether each app belongs to Home or Apps\n- choose whether each shortcut is shown or hidden\n- change the order of apps on both screens"
STR_README_ACHIEVEMENTS_BODY: "Remember to use Sync Day every day so most achievements can be tracked correctly.\nAchievements is a simple gamification system with reading goals and milestones to unlock."
STR_README_IF_FOUND_BODY: "An app that helps someone return the device if it gets lost.\n\nTyping on this device is painful, so if you add a file called if_found.txt to the SD card, its content will be shown when this app is opened.\n\nYou can write anything you want there: a sentence, a phone number, an email..."
